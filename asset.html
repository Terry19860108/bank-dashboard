.container{max-width:1200px;margin:0 auto;padding:10px 10px 20px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:12px 14px;position:relative;overflow:hidden}

.card.c2::before{background:#f59e0b}
.card.c3::before{background:#10b981}

.card .value{font-size:18px;font-weight:700}
.card .subv{font-size:11px;color:#8899b4;margin-top:2px}
.section{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:12px;margin-bottom:10px}
.section h3{font-size:13px;margin-bottom:8px;color:#9cc7ff}
.chart-wrap{width:100%;height:300px}
.col2{display:flex;flex-direction:column;gap:10px}

.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:500px}
th{background:rgba(0,150,255,.15);padding:7px 6px;text-align:center;font-weight:600;color:#9cc7ff;border-bottom:2px solid rgba(0,150,255,.3);white-space:nowrap;font-size:10px}
td{padding:7px 6px;text-align:center;border-bottom:1px solid rgba(255,255,255,.06);white-space:nowrap}
tr:active td{background:rgba(255,255,255,.04)}
tr.total td{background:rgba(0,150,255,.1);font-weight:700;color:#9cc7ff}
td.num{text-align:right}
td.up{color:#ef4444}
td.down{color:#22c55e}
.proj-cards{display:flex;flex-direction:column;gap:8px}
.pcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;overflow:hidden}
.pcard-header{padding:10px 12px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.pcard-header:active{background:rgba(255,255,255,.03)}
.pcard-amount{min-width:70px;text-align:right}

.pcard-amount .unit{font-size:10px;color:#8899b4}
.pcard-info{flex:1;min-width:0}
.pcard-info .pname{font-size:12px;font-weight:600;line-height:1.3;word-break:break-all}
.pcard-info .pmeta{font-size:10px;color:#8899b4;margin-top:3px;display:flex;flex-wrap:wrap;gap:6px}
.pcard-info .pmeta span{padding:1px 6px;border-radius:10px;font-size:10px}

.tag-cat{background:rgba(139,92,246,.2);color:#a78bfa}
.tag-status{background:rgba(245,158,11,.2);color:#fbbf24}
.tag-status.s2{background:rgba(16,185,129,.2);color:#34d399}
.pcard-body{display:none;padding:0 12px 12px 12px;font-size:11px;color:#8899b4;line-height:1.7;border-top:1px solid rgba(255,255,255,.06)}
.pcard-body.show{display:block}
.pcard-arrow{font-size:12px;color:#556;margin-top:4px}
.footer{text-align:center;padding:10px;font-size:10px;color:#556}
.btn-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.btn-s{background:rgba(0,150,255,.15);border:1px solid rgba(0,150,255,.3);color:#9cc7ff;padding:5px 10px;border-radius:14px;cursor:pointer;font-size:10px}

  h+='<div class="card c3"><div class="label">考核余额</div><div class="value">'+fmt(t.exam/10000,1)+'<span style="font-size:12px;color:#8899b4"> 亿元</span></div><div class="subv">年初：'+fmt(t.begin/10000,1)+'亿</div></div>';

  h+='<div class="card" style="--c:#8b5cf6"><div class="label">考核净增</div><div class="value" style="color:'+(t.enet>=0?'#ef4444':'#22c55e')+'">'+(t.enet>=0?'+':'')+fmt(t.enet/10000,1)+'<span style="font-size:12px;color:#8899b4"> 亿元</span></div></div>';
  document.getElementById('topCards').innerHTML=h;
}

function renderBalance(){
  var d=getBalFiltered();
  var ns=d.map(function(x){return x.name.replace('支行','');});
  var opt=gopt();
  opt.tooltip={trigger:'axis',axisPointer:{type:'shadow'},backgroundColor:'rgba(10,22,40,.95)',borderColor:'rgba(0,150,255,.3)',textStyle:{color:'#e8ecf1',fontSize:12},formatter:function(ps){var s='<b>'+ps[0].axisValue+'</b><br/>';ps.forEach(function(p){s+='<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+p.color+';margin-right:4px;"></span>'+p.seriesName+'：<b>'+fmt(p.value/10000,1)+'</b> 亿<br/>';});return s;}};
  opt.legend={data:['年初余额','4月末表内余额','考核余额'],textStyle:{color:'#8899b4',fontSize:m?10:12},top:0};
  opt.grid={left:'3%',right:'6%',bottom:m?'12%':'8%',top:m?'16%':'12%',containLabel:!0};
  opt.xAxis={type:'category',data:ns,axisLine:{lineStyle:{color:'rgba(255,255,255,.15)'}},axisLabel:{color:'#8899b4',fontSize:m?9:12,rotate:m?25:0},axisTick:{show:!1}};
  opt.yAxis={type:'value',name:'亿元',nameTextStyle:{color:'#8899b4'},axisLabel:{color:'#8899b4',fontSize:m?9:11,formatter:function(v){return(v/10000).toFixed(1);}},splitLine:{lineStyle:{color:'rgba(255,255,255,.06)'}}};
  opt.series=[
    {name:'年初余额',type:'bar',data:d.map(function(x){return x.begin;}),itemStyle:{color:'#3b82f6',borderRadius:[4,4,0,0]},barWidth:m?'30%':'25%'},
    {name:'4月末表内余额',type:'bar',data:d.map(function(x){return x.balance;}),itemStyle:{color:'#f59e0b',borderRadius:[4,4,0,0]},barWidth:m?'30%':'25%'},
    {name:'考核余额',type:'bar',data:d.map(function(x){return x.exam;}),itemStyle:{color:'#10b981',borderRadius:[4,4,0,0]},barWidth:m?'30%':'25%'}
  ];
  c1.setOption(opt,!0);
}

function renderNet(){
  var d=getBalFiltered();
  var ns=d.map(function(x){return x.name.replace('支行','');});
  var opt=gopt();
  opt.tooltip={trigger:'axis',axisPointer:{type:'shadow'},backgroundColor:'rgba(10,22,40,.95)',borderColor:'rgba(0,150,255,.3)',textStyle:{color:'#e8ecf1',fontSize:12}};
  opt.legend={data:['账面净增','考核净增'],textStyle:{color:'#8899b4',fontSize:m?10:12},top:0};
  opt.grid={left:'3%',right:'6%',bottom:m?'12%':'8%',top:m?'16%':'12%',containLabel:!0};
  opt.xAxis={type:'category',data:ns,axisLine:{lineStyle:{color:'rgba(255,255,255,.15)'}},axisLabel:{color:'#8899b4',fontSize:m?9:12,rotate:m?25:0},axisTick:{show:!1}};
  opt.yAxis={type:'value',name:'万元',nameTextStyle:{color:'#8899b4'},axisLabel:{color:'#8899b4',fontSize:m?9:11},splitLine:{lineStyle:{color:'rgba(255,255,255,.06)'}}};
  opt.series=[
    {name:'账面净增',type:'bar',data:d.map(function(x){return{value:x.bnet,itemStyle:{color:x.bnet>=0?'#ef4444':'#22c55e',borderRadius:[4,4,0,0]}};}),barWidth:m?'40%':'35%',label:{show:!0,position:'top',color:'#8899b4',fontSize:m?8:10,formatter:function(p){return(p.value>=0?'+':'')+fmt(p.value/10000,1)+'亿';}}},
    {name:'考核净增',type:'bar',data:d.map(function(x){return{value:x.enet,itemStyle:{color:x.enet>=0?'#f97316':'#22c55e',borderRadius:[4,4,0,0]}};}),barWidth:m?'40%':'35%',label:{show:!0,position:'top',color:'#8899b4',fontSize:m?8:10,formatter:function(p){return(p.value>=0?'+':'')+fmt(p.value/10000,1)+'亿';}}}
  ];
  c2.setOption(opt,!0);
}

function renderRate(){
  var d=getBalFiltered();
  var pieData=d.map(function(x){return{name:x.name.replace('支行',''),value:x.balance};});
  var colors=['#3b82f6','#f59e0b','#10b981','#8b5cf6','#ef4444','#f97316','#06b6d4','#84cc16'];
  var opt=gopt();
  opt.tooltip={trigger:'item',backgroundColor:'rgba(10,22,40,.95)',borderColor:'rgba(0,150,255,.3)',textStyle:{color:'#e8ecf1',fontSize:12},formatter:function(p){return p.name+'：<b>'+fmt(p.value/10000,1)+'</b> 亿（'+p.percent+'%）';}};
  opt.legend={orient:'vertical',right:m?0:'5%',top:'center',textStyle:{color:'#8899b4',fontSize:m?9:12}};
  opt.series=[{type:'pie',radius:['40%','70%'],center:[m?'30%':'35%','50%'],label:{formatter:function(p){return p.percent+'%';},fontSize:m?10:12},emphasis:{label:{fontSize:m?16:20}},data:pieData.map(function(d,i){return{name:d.name,value:d.value,itemStyle:{color:colors[i%colors.length]}};})}];
  c3.setOption(opt,!0);
}

// ============ 模块二 ============
function renderStack(){
  var cats=['房地产','科技金融','政信业务'];
  var catColors={房地产:'#f59e0b',科技金融:'#3b82f6',政信业务:'#10b981'};
  var ns=projSummary.map(function(x){return x.name.replace('支行','');});
  var series=cats.map(function(cat){
    var d=projSummary.map(function(r){
      var sum=0;
      Object.keys(r).forEach(function(k){if(k.indexOf(cat)===0)sum+=r[k];});
      return sum;
    });
    return {name:cat,type:'bar',data:d,itemStyle:{color:catColors[cat]},barWidth:m?'50%':'35%',emphasis:{focus:'series'}};
  });
  var opt=gopt();
  opt.tooltip={trigger:'axis',axisPointer:{type:'shadow'},backgroundColor:'rgba(10,22,40,.95)',borderColor:'rgba(0,150,255,.3)',textStyle:{color:'#e8ecf1',fontSize:12}};
  opt.legend={data:cats,textStyle:{color:'#8899b4',fontSize:m?9:11},top:0};
  opt.grid={left:'3%',right:'6%',bottom:m?'12%':'8%',top:m?'18%':'12%',containLabel:!0};
  opt.xAxis={type:'category',data:ns,axisLine:{lineStyle:{color:'rgba(255,255,255,.15)'}},axisLabel:{color:'#8899b4',fontSize:m?9:12,rotate:m?25:0},axisTick:{show:!1}};
  opt.yAxis={type:'value',name:'万元',nameTextStyle:{color:'#8899b4'},axisLabel:{color:'#8899b4',fontSize:m?9:11},splitLine:{lineStyle:{color:'rgba(255,255,255,.06)'}}};
  opt.series=series;
  c4.setOption(opt,!0);
}

function renderPie(){
  var pieData=[];
  var cats={房地产:0,科技金融:0,政信业务:0};
  projSummary.forEach(function(r){
    Object.keys(r).forEach(function(k){
      if(k==='name'||k==='total')return;
      if(k.indexOf('房地产')===0)cats['房地产']+=r[k];
      else if(k.indexOf('科技金融')===0)cats['科技金融']+=r[k];
      else if(k.indexOf('政信')===0)cats['政信业务']+=r[k];
    });
  });
  Object.keys(cats).forEach(function(k){if(cats[k]>0)pieData.push({name:k,value:cats[k]});});
  var colors={房地产:'#f59e0b',科技金融:'#3b82f6',政信业务:'#10b981'};
  var opt=gopt();
  opt.tooltip={trigger:'item',backgroundColor:'rgba(10,22,40,.95)',borderColor:'rgba(0,150,255,.3)',textStyle:{color:'#e8ecf1',fontSize:12},formatter:function(p){return p.name+'：<b>'+fmt(p.value/10000,1)+'</b> 亿（'+p.percent+'%）';}};
  opt.legend={orient:'vertical',right:m?0:'5%',top:'center',textStyle:{color:'#8899b4',fontSize:m?9:12}};
  opt.series=[{type:'pie',radius:['40%','70%'],center:[m?'30%':'35%','50%'],avoidLabelOverlap:!1,label:{show:!0,formatter:function(p){return p.percent+'%';},fontSize:m?10:12},emphasis:{label:{fontSize:m?16:20}},data:pieData.map(function(d){return{name:d.name,value:d.value,itemStyle:{color:colors[d.name]}};})}];
  c5.setOption(opt,!0);
}

function renderProgress(){
  var sts={拟上报:0,在审:0,已批待投:0};
  projDetail.forEach(function(p){sts[p.进展]+=p.金额;});
  var opt=gopt();
  opt.tooltip={trigger:'axis',axisPointer:{type:'shadow'},backgroundColor:'rgba(10,22,40,.95)',borderColor:'rgba(0,150,255,.3)',textStyle:{color:'#e8ecf1',fontSize:12},formatter:function(ps){var v=ps[0].value;return ps[0].name+'：<b>'+fmt(v/10000,1)+'</b> 亿（'+ps[0].percent+'%）';}};
  opt.grid={left:'3%',right:'6%',bottom:m?'12%':'8%',top:'8%',containLabel:!0};
  opt.xAxis={type:'category',data:['拟上报','在审','已批待投'],axisLine:{lineStyle:{color:'rgba(255,255,255,.15)'}},axisLabel:{color:'#8899b4',fontSize:m?10:12},axisTick:{show:!1}};
  opt.yAxis={type:'value',name:'亿元',nameTextStyle:{color:'#8899b4'},axisLabel:{color:'#8899b4',fontSize:m?9:11,formatter:function(v){return(v/10000).toFixed(1);}},splitLine:{lineStyle:{color:'rgba(255,255,255,.06)'}}};
  opt.series=[{type:'bar',barWidth:m?'55%':'45%',data:[
    {value:sts['拟上报'],itemStyle:{color:'#f59e0b',borderRadius:[4,4,0,0]}},
    {value:sts['在审'],itemStyle:{color:'#3b82f6',borderRadius:[4,4,0,0]}},
    {value:sts['已批待投'],itemStyle:{color:'#10b981',borderRadius:[4,4,0,0]}}
  ],label:{show:!0,position:'top',color:'#8899b4',fontSize:m?10:12,formatter:function(p){return fmt(p.value/10000,1)+'亿';}}}];
  c6.setOption(opt,!0);
}

// ============ 模块三 ============
var pfilter='all';
function renderProjCards(){
  var filtered=pfilter==='all'?projDetail:projDetail.filter(function(p){return p.进展===pfilter||p.分类===pfilter;});
  var h='';
  filtered.forEach(function(p,i){
    var sc=p.进展==='已批待投'?' s2':'';
    h+='<div class="pcard"><div class="pcard-header" onclick="toggleProj('+i+')"><div class="pcard-amount"><div class="amt" style="color:'+(p.进展==='已批待投'?'#34d399':(p.进展==='在审'?'#fbbf24':'#f59e0b'))+'">'+fmt(p.金额/10000,1)+'</div><div class="unit">亿元</div></div><div class="pcard-info"><div class="pname">'+p.客户+'</div><div class="pmeta"><span class="tag-biz">'+p.品种+'</span><span class="tag-cat">'+p.分类+'</span><span class="tag-status'+sc+'">'+p.进展+'</span><span>'+p.支行+'</span></div></div><div class="pcard-arrow">▶</div></div><div class="pcard-body" id="pbody'+i+'">'+p.详情+'</div></div>';
  });
  document.getElementById('projCards').innerHTML=h||'<div style="text-align:center;color:#556;padding:20px">暂无匹配项目</div>';
}
function toggleProj(i){
  var b=document.getElementById('pbody'+i);
  b.classList.toggle('show');
  var arrow=b.parentElement.querySelector('.pcard-arrow');
  arrow.textContent=b.classList.contains('show')?'▼':'▶';
}
function filterProj(f,el){
  pfilter=f;
  document.querySelectorAll('.btn-s').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  renderProjCards();
}

window.addEventListener('resize',function(){
  c1&&c1.resize();c2&&c2.resize();c3&&c3.resize();c4&&c4.resize();c5&&c5.resize();c6&&c6.resize();
});
</script>
