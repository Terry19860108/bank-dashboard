<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>兴业银行北京经开区中支</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:linear-gradient(135deg,#0a1628,#1a2a4a);color:#e8ecf1;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.cards{display:flex;flex-direction:column;gap:16px;width:100%;max-width:400px}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:24px 20px;text-decoration:none;color:#e8ecf1;transition:all .3s;position:relative;overflow:hidden}
.card:hover,.card:active{background:rgba(0,150,255,.1);border-color:rgba(0,150,255,.3);transform:translateY(-2px)}
.card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%}
.card.c1::before{background:#3b82f6}
.card.c2::before{background:#f59e0b}
.card h3{font-size:17px;margin-bottom:6px;color:#9cc7ff}
.card p{font-size:12px;color:#8899b4;line-height:1.6}
.card .icon{font-size:28px;margin-bottom:8px;display:block}
</style>
</head>
<body>
<div class="cards">
  <a class="card c1" href="puhui.html">
    <span class="icon">📊</span>
    <h3>普惠储备余额动态看板</h3>
    <p>各支行年初/当前/5月末余额 · 净增变化 · 序时完成率</p>
  </a>
  <a class="card c2" href="asset.html">
    <span class="icon">🏦</span>
    <h3>资产储备动态看板</h3>
    <p>各支行资产余额 · 考核情况 · 20笔储备项目明细</p>
  </a>
</div>
</body>
</html>
